# brrr spec — describe modules, models, fields and relationships, then generate
# them all at project creation time:
#
#   brrr init shop --module github.com/example/shop --spec spec.example.yaml
#
# Field types: string, text, int, int64, float, decimal, bool, uuid,
#              date, datetime, time, json.
# Field modifiers (after the type): required, unique
#              e.g. "string required" or "string required unique".
# Relationships: "<kind> <Target>" — currently belongs_to. The target may be
#                the built-in User or any model defined below. Models are
#                generated in dependency order automatically.

modules:
  blog:
    models:
      Post:
        fields:
          title: string required
          body: text
          published: bool
        relationships:
          author: belongs_to User
      Comment:
        fields:
          body: text required
        relationships:
          post: belongs_to Post
          author: belongs_to User

# Standard packages (email, notifications, ...) are recognised but not generated
